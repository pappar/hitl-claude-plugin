# System Manifest Schema Definition
# Documents the structure of a project's system-manifest.yaml
# Fields marked [auto] are generated by the manifest generator.
# Fields marked [human] require human judgment and are preserved across runs.

schema:
  version:
    type: string
    authored: auto
    description: "Schema version (e.g., '1.0')"

  generated_at:
    type: datetime
    authored: auto
    description: "ISO timestamp of last generation"

  generator:
    type: string
    authored: auto
    description: "Path to the generator script"

  domains:
    type: map[string, DomainEntry]
    description: "One entry per domain (bounded context). Key is the domain name."

    DomainEntry:
      purpose:
        type: string
        authored: human
        description: "One-line description of what this domain does"

      files:
        type: list[string]
        authored: auto
        description: "File paths relative to the project root"

      lld:
        type: string | list[string]
        authored: auto
        description: "Path(s) to LLD documentation"

      tests:
        type: list[string]
        authored: auto
        description: "Test file paths for this domain"

      boundary_entities:
        type: map[string, BoundaryEntity]
        authored: human
        description: "Entity shapes that cross this domain's boundary — what callers see"

        BoundaryEntity:
          shape:
            type: string
            description: "Multi-line field definition with types"
          consumed_by:
            type: list[string]
            description: "Which domains consume this entity"
          note:
            type: string
            optional: true

      facade_apis:
        type: map[string, FacadeAPI]
        authored: human
        description: "APIs visible to other domains — enough to call correctly without reading source"

        FacadeAPI:
          signature:
            type: string
            description: "Method signature with types"
          blurb:
            type: string
            description: "What the API does in one paragraph. Written for someone who will never read the implementation."
          mutations:
            type: list[string]
            description: "Side effects: INSERT, UPDATE, external API call, Langfuse span, etc. Mark IRREVERSIBLE effects explicitly."
          preconditions:
            type: list[string]
            description: "What must be true before calling"
          error_modes:
            type: list[string]
            description: "What can go wrong and how it's handled"

      events_emitted:
        type: list[EventEntry]
        authored: human
        EventEntry:
          name: { type: string }
          shape: { type: string, description: "Payload shape" }
          consumed_by: { type: list[string] }
          note: { type: string, optional: true }

      events_consumed:
        type: list[EventRef]
        authored: human
        EventRef:
          name: { type: string }
          from: { type: string, description: "Source domain" }
          note: { type: string, optional: true }

      depends_on:
        type: list[string]
        authored: auto
        description: "Other domain names this domain depends on"

      conventions:
        type: list[string]
        authored: auto
        description: "Convention names from the cross_cutting section that apply to this domain"

      last_changed:
        type: object
        authored: human
        fields:
          date: { type: string, description: "YYYY-MM-DD" }
          summary: { type: string, description: "One-line change summary" }

  cross_cutting:
    type: list[ConventionEntry]
    description: "Conventions that apply across domain boundaries"

    ConventionEntry:
      name:
        type: string
        description: "Short identifier (used in domain.conventions lists)"
      rule:
        type: string
        description: "The enforceable rule — specific enough to check"
      affected_domains:
        type: list[string]
        description: "Which domains must follow this rule"
      enforcement:
        type: string
        description: "How it's enforced: code check, runtime validation, code review"
      adr:
        type: string
        optional: true
        description: "Path to the ADR that decided this convention"

  interaction_matrix:
    type: map[string, InteractionEntry]
    description: "Directed edges between domains. Key format: 'domain_a -> domain_b'"

    InteractionEntry:
      description:
        type: string
        description: "What the interaction is (one sentence)"
      entity_crossing:
        type: string
        description: "What data crosses the boundary (entity names or shapes)"
